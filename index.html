<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Roleta - ROX</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0f0f1b;
            --card-bg: #1a1b2e;
            --accent: #ff007a;
            --text: #e0e0e6;
            --rare: #ffcc00;
            --common: #888;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            width: 100vw;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            padding: 0 20px;
        }

        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            width: 100%;
        }

        .left-panel {
            flex: 1;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .right-panel {
            flex: 1.2;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
        }

        .lang-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            z-index: 100;
        }

        .help-btn {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--rare);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            z-index: 100;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--rare);
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.2);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            line-height: 1;
        }

        .help-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.85em;
        }

        .help-table th, .help-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .help-table th {
            color: var(--rare);
            text-transform: uppercase;
        }

        .responsible-note {
            background: rgba(255, 0, 122, 0.1);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            margin-top: 20px;
            font-style: italic;
        }

        .kraken-mode {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .kraken-mode input {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            width: 100px;
            font-size: 1.1em;
        }

        .kraken-btn {
            background: linear-gradient(135deg, #ffcc00, #b8860b) !important;
            color: #111 !important;
        }

        .hidden {
            display: none !important;
        }

        .roulette-marker.hidden {
            display: none !important;
        }

        h1 {
            font-size: 2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 0, 122, 0.5);
            margin: 5px 0;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.2em;
            font-weight: bold;
            color: #a6e3a1;
        }

        .stat-label {
            font-size: 0.7em;
            text-transform: uppercase;
            color: #888;
        }

        /* Roulette Visuals */
        .lucky-title {
            text-align: center;
            font-size: 1.8em;
            color: var(--rare);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            position: relative;
            z-index: 5;
        }

        .roulette-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            overflow: visible;
        }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 690px;
            aspect-ratio: 690 / 523;
            background-image: url('roleta.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .roulette-viewport {
            position: absolute;
            top: 41.1%;
            width: 84%;
            height: 22.9%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            transition: background 0.3s, box-shadow 0.3s;
            border-radius: 4px;
        }

        .roulette-viewport.show-grid {
            top: 10%;
            width: 95%;
            height: auto;
            min-height: 80%;
            overflow: visible;
            background: rgba(15, 15, 27, 0.95);
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            z-index: 30;
            border-color: var(--accent);
            border-width: 3px;
        }

        .roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            height: 100%;
            transition: left 4s cubic-bezier(0.1, 0, 0.1, 1);
            align-items: center;
        }

        .roulette-item {
            min-width: 20.68%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .item-icon {
            width: 70%;
            height: 70%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .roulette-item.rare {
            background: radial-gradient(circle, rgba(255, 204, 0, 0.15) 0%, transparent 70%);
        }

        .roulette-track.fast-spin-grid {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 4px;
            padding: 4px;
            background: transparent;
        }

        .roulette-track.fast-spin-grid .roulette-item {
            min-width: 0;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        
        .roulette-track.fast-spin-grid .item-icon {
            width: 80%;
            height: 80%;
            margin: 0;
        }

        .roulette-marker {
            position: absolute;
            top: 39.1%;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 26.7%;
            background-color: var(--accent);
            z-index: 10;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 20;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .fast-spin-opt {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #888;
            cursor: pointer;
            user-select: none;
        }

        .fast-spin-opt input {
            cursor: pointer;
            accent-color: var(--accent);
        }

        button {
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3) !important;
        }

        button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
        }

        .btn-spin {
            background: linear-gradient(135deg, #ff007a, #b00055);
            color: white;
        }

        .btn-spin:hover {
            filter: brightness(1.2);
        }

        .btn-reset {
            background: #444;
            color: #ccc;
        }

        /* Inventory Grid */
        .inventory-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-height: 900px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .inventory-section::-webkit-scrollbar {
            width: 6px;
        }
        .inventory-section::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }
        .inventory-section::-webkit-scrollbar-track {
            background: transparent;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.5em;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .card.has-items {
            border-color: rgba(166, 227, 161, 0.3);
        }

        .card.rare {
            border-color: rgba(255, 204, 0, 0.3);
            background: radial-gradient(circle at top right, rgba(255, 204, 0, 0.1), transparent);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 5px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 5px;
        }

        .card-name {
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 3px;
            height: 2.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.1;
        }

        .card-prob {
            font-size: 0.7em;
            color: #888;
        }

        .card-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: none;
        }

        .card.has-items .card-count {
            display: block;
        }

        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
                gap: 20px;
                width: 100%;
                align-items: center;
            }
            .left-panel, .right-panel {
                width: 100%;
                max-width: 100%;
                flex: none;
            }
            .container {
                padding: 0 10px;
            }
            h1 {
                font-size: 1.5em;
            }
            .lucky-title {
                font-size: 1.2em;
                margin-bottom: 0px;
            }
            
            .stats-bar {
                display: flex;
                flex-direction: row;
                justify-content: space-around;
                align-items: flex-start;
                gap: 5px;
                padding: 10px 5px;
                width: 100%;
            }
            .stat-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .stats-bar .stat-label {
                font-size: 0.45em;
                text-align: center;
                line-height: 1.2;
                margin-bottom: 3px;
            }
            .stats-bar .stat-value {
                font-size: 0.85em;
            }
            .controls {
                margin-top: 10px;
            }

            /* Adaptação do Grid Rápido para 3 linhas e 4 colunas no mobile */
            .roulette-viewport.show-grid {
                top: 5%;
                min-height: 250px; 
            }
            .roulette-track.fast-spin-grid {
                grid-template-columns: repeat(4, 1fr);
                grid-auto-rows: minmax(70px, 1fr);
                gap: 5px;
                padding: 10px;
            }
            .roulette-track.fast-spin-grid .item-icon {
                width: 90%;
                height: 90%;
            }
            
            /* Shrink inventory cards by roughly 50% */
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 10px;
            }
            .card {
                padding: 8px;
                border-radius: 6px;
            }
            .card-icon {
                width: 50px;
                height: 50px;
                margin-bottom: 5px;
            }
            .card-name {
                font-size: 0.65em;
                height: 3em;
            }
            .card-prob {
                font-size: 0.6em;
            }
            .card-count {
                padding: 1px 5px;
                font-size: 0.65em;
                top: -5px;
                right: -5px;
            }
        }
    </style>
</head>

<div class="container">
    <header>
        <button class="help-btn" onclick="toggleHelp()">HELP</button>
        <h1 id="mainTitle">ROX Simulator</h1>
        <button class="lang-toggle" onclick="toggleLang()">PT / EN</button>
    </header>

    <!-- Modal de Ajuda -->
    <div id="helpModal" class="modal-overlay hidden" onclick="closeHelp(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="toggleHelp()">×</button>
            <div id="helpBody">
                <!-- Conteúdo dinâmico via JS -->
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label" id="labelSpins">Total Spins</span>
                    <span id="totalSpins" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label" id="labelExtra">Extra Spins</span>
                    <span id="extraSpins" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label" id="labelValue">Total Value (Crystals)</span>
                    <span id="totalValue" class="stat-value">0</span>
                </div>
            </div>

            <div class="lucky-title">Lucky Draw</div>
            
            <div class="roulette-container">
                <div class="roulette-wrapper">
                    <div id="rouletteMarker" class="roulette-marker"></div>
                    <div class="roulette-viewport">
                        <div id="rouletteTrack" class="roulette-track"></div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="btn-group">
                    <button id="btnSpin1" class="btn-spin" onclick="handleSpin(1)">Spin 1x</button>
                    <button id="btnSpin10" class="btn-spin" onclick="handleSpin(10)">Spin 10x</button>
                    <button id="btnReset" class="btn-reset" onclick="reset()">Reset</button>
                </div>

                <div class="kraken-mode">
                    <input type="number" id="krakenAmount" value="100" min="1" max="100000">
                    <button class="btn-spin kraken-btn" onclick="handleKrakenSpin()">
                        <span id="labelKraken">I'm a Kraken!</span> 🐋
                    </button>
                </div>

                <label class="fast-spin-opt">
                    <input type="checkbox" id="fastSpin"> <span id="labelFast">Fast Spin (Skip animation)</span>
                </label>
            </div>
        </div>

        <div class="right-panel">
            <section class="inventory-section">
                <h2 id="labelInventory">Your Inventory</h2>
                <div id="inventoryGrid" class="grid"></div>
            </section>
        </div>
    </div>
</div>

        { name: "2 Moedas para Novos Giros", en: "2 Spin Coins", prob: 0.060916, value: 40000, extra: 2, img: "icon13.png" },
        { name: "50 Balões", en: "50 Balloons", prob: 0.060916, value: 13000, img: "icon14.png" },
        { name: "1 Stamina", en: "1 Stamina", prob: 0.122450, value: 13000, img: "icon15.png" },
        { name: "1 Moeda de Blessing", en: "1 Blessing Coin", prob: 0.122450, value: 10000, img: "icon16.png" },
        { name: "10 Balões", en: "10 Balloons", prob: 0.122450, value: 2700, img: "icon17.png" },
        { name: "10.000 Crystais", en: "10,000 Crystals", prob: 0.122450, value: 10000, img: "icon18.png" },
        { name: "2 Carat Diamond", en: "2 Carat Diamond", prob: 0.122450, value: 1000, img: "icon19.png" }
    ];

    let currentLang = 'en';

    let cumulativePrizes = [];
    let currentAccumulator = 0;
    prizes.forEach(p => {
        currentAccumulator += p.prob;
        cumulativePrizes.push({ ...p, threshold: currentAccumulator });
    });

    let state = {
        spins: 0,
        extraSpinsWon: 0,
        totalCrystalValue: 0,
        inventory: {},
        isSpinning: false
    };

    function initInventory() {
        prizes.forEach(p => state.inventory[p.name] = 0);
    }

    const formatNumber = (num) => new Intl.NumberFormat(currentLang === 'en' ? 'en-US' : 'pt-BR').format(num);

    function toggleLang() {
        currentLang = currentLang === 'en' ? 'pt' : 'en';
        applyLang();
        updateUI();
    }

    function applyLang() {
        const t = translations[currentLang];
        document.getElementById('mainTitle').innerText = t.mainTitle;
        document.getElementById('labelSpins').innerText = t.labelSpins;
        document.getElementById('labelExtra').innerText = t.labelExtra;
        document.getElementById('labelValue').innerText = t.labelValue;
        document.getElementById('labelInventory').innerText = t.labelInventory;
        document.getElementById('btnSpin1').innerText = t.btnSpin1;
        document.getElementById('btnSpin10').innerText = t.btnSpin10;
        document.getElementById('btnReset').innerText = t.btnReset;
        document.getElementById('labelFast').innerText = t.labelFast;
        document.getElementById('labelKraken').innerText = t.labelKraken;
    }

    function toggleHelp() {
        const modal = document.getElementById('helpModal');
        modal.classList.toggle('hidden');
        if (!modal.classList.contains('hidden')) {
            renderHelpContent();
        }
    }

    function closeHelp(e) {
        document.getElementById('helpModal').classList.add('hidden');
    }

    function renderHelpContent() {
        const t = translations[currentLang];
        let html = `<h2>${t.helpTitle}</h2>`;
        html += `<table class="help-table">
            <thead>
                <tr>
                    <th>${t.itemLabel}</th>
                    <th>${t.probLabel}</th>
                    <th>${t.avgLabel}</th>
                </tr>
            </thead>
            <tbody>`;
        
        statsData.forEach(s => {
            const name = currentLang === 'en' ? s.en : s.name;
            html += `<tr>
                <td>${name}</td>
                <td>${s.prob}</td>
                <td>${s.avg}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        html += `<div class="responsible-note">${t.helpNote}</div>`;
        
        document.getElementById('helpBody').innerHTML = html;
    }

    function createCard(p) {
        const count = state.inventory[p.name];
        const card = document.createElement('div');
        card.className = `card ${p.isRare ? 'rare' : ''} ${count > 0 ? 'has-items' : ''}`;
        
        const displayName = currentLang === 'en' ? p.en : p.name;
        
        card.innerHTML = `
            <div class="card-count">${formatNumber(count)}</div>
            <div class="card-icon" style="background-image: url('${p.img}')"></div>
            <div class="card-name">${displayName}</div>
            <div class="card-prob">${(p.prob * 100).toFixed(4)}%</div>
        `;
        return card;
    }

    function updateUI() {
        document.getElementById('totalSpins').innerText = formatNumber(state.spins);
        document.getElementById('extraSpins').innerText = formatNumber(state.extraSpinsWon);
        document.getElementById('totalValue').innerText = formatNumber(state.totalCrystalValue);

        const grid = document.getElementById('inventoryGrid');
        grid.innerHTML = '';
        prizes.forEach(p => {
            grid.appendChild(createCard(p));
        });
    }

    function spinLogic() {
        state.spins++;
        const roll = Math.random();
        const wonItem = cumulativePrizes.find(p => roll <= p.threshold) || cumulativePrizes[cumulativePrizes.length - 1];
        
        state.inventory[wonItem.name]++;
        state.totalCrystalValue += wonItem.value;
        if (wonItem.extra) {
            state.extraSpinsWon += wonItem.extra;
        }
        return wonItem;
    }

    function setControlsDisabled(disabled) {
        document.getElementById('btnSpin1').disabled = disabled;
        document.getElementById('btnSpin10').disabled = disabled;
        document.getElementById('btnReset').disabled = disabled;
        document.getElementById('fastSpin').disabled = disabled;
    }

    async function handleSpin(times) {
        if (state.isSpinning) return;
        
        const fast = document.getElementById('fastSpin').checked;
        
        if (fast) {
            document.getElementById('rouletteMarker').classList.add('hidden');
            let wonItems = [];
            for (let i = 0; i < times; i++) {
                wonItems.push(spinLogic());
            }
            updateUI();
            
            if (times === 10) {
                showFastSpinGrid(wonItems);
            } else if (wonItems.length > 0) {
                showFastSpinItem(wonItems[0]);
            }
        } else {
            document.getElementById('rouletteMarker').classList.remove('hidden');
            setControlsDisabled(true);
            for (let i = 0; i < times; i++) {
                await animateSpin();
            }
            setControlsDisabled(false);
        }
    }

    async function handleKrakenSpin() {
        if (state.isSpinning) return;
        const amountInput = document.getElementById('krakenAmount');
        const amount = parseInt(amountInput.value);
        if (isNaN(amount) || amount <= 0) return;

        setControlsDisabled(true);
        document.getElementById('rouletteMarker').classList.add('hidden');
        
        let wonItems = [];
        for (let i = 0; i < amount; i++) {
            const item = spinLogic();
            if (wonItems.length < 10) wonItems.push(item);
        }

        updateUI();
        showFastSpinGrid(wonItems);
        setControlsDisabled(false);
    }

    function showFastSpinGrid(items) {
        const track = document.getElementById('rouletteTrack');
        const viewport = document.querySelector('.roulette-viewport');
        track.className = 'roulette-track fast-spin-grid';
        viewport.classList.add('show-grid');
        track.style.transition = 'none';
        track.style.left = '0px'; 
        track.innerHTML = '';
        
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `roulette-item ${item.isRare ? 'rare' : ''}`;
            
            div.style.transition = 'transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.1s ease-out';
            div.style.transitionDelay = `${index * 0.03}s`;
            div.style.transform = 'scale(0)';
            div.style.opacity = '0';
            div.style.boxSizing = 'border-box';
            div.innerHTML = `<div class="item-icon" style="background-image: url('${item.img}')"></div>`;
            track.appendChild(div);
        });

        track.offsetHeight; // Reflow

        Array.from(track.children).forEach(div => {
            div.style.transform = 'scale(1)';
            div.style.opacity = '1';
        });
    }

    function showFastSpinItem(item) {
        const track = document.getElementById('rouletteTrack');
        const viewport = document.querySelector('.roulette-viewport');
        track.className = 'roulette-track'; 
        viewport.classList.remove('show-grid');
        track.style.transition = 'none';
        track.innerHTML = '';
        
        const viewportWidth = viewport.clientWidth;
        const itemWidth = viewportWidth * 0.2068;

        const div = document.createElement('div');
        div.className = `roulette-item ${item.isRare ? 'rare' : ''}`;
        div.style.minWidth = itemWidth + 'px';
        div.style.transition = 'transform 0.1s ease-out, opacity 0.1s ease-out';
        div.style.transform = 'scale(0.5)';
        div.style.opacity = '0.5';
        div.innerHTML = `<div class="item-icon" style="background-image: url('${item.img}')"></div>`;
        track.appendChild(div);
        
        track.style.left = `${(viewportWidth / 2) - (itemWidth / 2)}px`;

        track.offsetHeight; // Reflow

        div.style.transform = 'scale(1)';
        div.style.opacity = '1';
    }

    function animateSpin() {
        return new Promise((resolve) => {
            state.isSpinning = true;
            const track = document.getElementById('rouletteTrack');
            const viewport = document.querySelector('.roulette-viewport');
            
            track.className = 'roulette-track'; 
            viewport.classList.remove('show-grid');
            track.style.transition = 'none';
            track.style.left = '0px';

            const itemCount = 50;
            track.innerHTML = '';

            const viewportWidth = viewport.clientWidth;
            const itemWidth = viewportWidth * 0.2068;
            
            for (let i = 0; i < itemCount; i++) {
                const roll = Math.random();
                const item = cumulativePrizes.find(p => roll <= p.threshold) || cumulativePrizes[cumulativePrizes.length - 1];
                const div = document.createElement('div');
                div.className = `roulette-item ${item.isRare ? 'rare' : ''}`;
                div.style.minWidth = itemWidth + 'px';
                div.innerHTML = `<div class="item-icon" style="background-image: url('${item.img}')"></div>`;
                track.appendChild(div);
            }

            const winningItem = spinLogic();
            const winningIndex = itemCount - 5;
            const winningDiv = track.children[winningIndex];
            winningDiv.className = `roulette-item ${winningItem.isRare ? 'rare' : ''}`;
            winningDiv.style.minWidth = itemWidth + 'px';
            winningDiv.innerHTML = `<div class="item-icon" style="background-image: url('${winningItem.img}')"></div>`;

            const stopPos = -(winningIndex * itemWidth) + (viewportWidth / 2) - (itemWidth / 2);

            track.offsetHeight;
            track.style.transition = 'left 2s cubic-bezier(0.1, 0, 0.1, 1)'; 
            track.style.left = stopPos + 'px';

            setTimeout(() => {
                state.isSpinning = false;
                updateUI();
                resolve();
            }, 2100);
        });
    }

    function reset() {
        if (state.isSpinning) return;
        
        const marker = document.getElementById('rouletteMarker');
        if (marker) marker.classList.remove('hidden');
        
        const viewport = document.querySelector('.roulette-viewport');
        if (viewport) viewport.classList.remove('show-grid');
        
        state.spins = 0;
        state.extraSpinsWon = 0;
        state.totalCrystalValue = 0;
        initInventory();
        updateUI();
        document.getElementById('rouletteTrack').innerHTML = '';
        document.getElementById('rouletteTrack').style.left = '0px';
    }

    initInventory();
    applyLang();
    updateUI();
</script>
</body>
</html>
