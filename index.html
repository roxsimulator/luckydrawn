<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Roleta - ROX</title>
    <style>
        :root {
            --bg-color: #0f0f1b;
            --card-bg: #1a1b2e;
            --accent: #ff007a;
            --text: #e0e0e6;
            --rare: #ffcc00;
            --common: #888;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
        }

        .lang-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
        }

        h1 {
            font-size: 2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 0, 122, 0.5);
            margin: 5px 0;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.2em;
            font-weight: bold;
            color: #a6e3a1;
        }

        .stat-label {
            font-size: 0.7em;
            text-transform: uppercase;
            color: #888;
        }

        /* Roulette Visuals */
        .lucky-title {
            text-align: center;
            font-size: 1.8em;
            color: var(--rare);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: -40px; /* Puxa a roleta para perto do título */
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            position: relative;
            z-index: 5;
        }

        .roulette-wrapper {
            position: relative;
            width: 690px;
            height: 523px;
            margin: -50px auto -130px; /* Reduz brutalmente o espaço invisível da imagem */
            background-image: url('roleta.png');
            background-size: contain;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transform: scale(0.85); /* Deixa a roleta levemente menor para caber melhor */
        }

        .roulette-viewport {
            position: absolute;
            top: 215px;
            width: 580px;
            height: 120px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
        }

        .roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            transition: left 4s cubic-bezier(0.1, 0, 0.1, 1);
            align-items: center;
        }

        .roulette-item {
            min-width: 120px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .item-icon {
            width: 80px;
            height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .roulette-item.rare {
            background: radial-gradient(circle, rgba(255, 204, 0, 0.15) 0%, transparent 70%);
        }

        .roulette-track.fast-spin-grid {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2px;
            background: transparent;
        }

        .roulette-track.fast-spin-grid .roulette-item {
            min-width: 0;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        
        .roulette-track.fast-spin-grid .item-icon {
            width: 45px;
            height: 45px;
            margin: 0;
        }

        .roulette-marker {
            position: absolute;
            top: 205px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 140px;
            background-color: var(--accent);
            z-index: 10;
            box-shadow: 0 0 10px var(--accent);
        }

        .roulette-marker.hidden {
            display: none !important;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 20; /* Garante que os botões fiquem clicáveis acima da imagem invisível da roleta */
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .fast-spin-opt {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #888;
            cursor: pointer;
            user-select: none;
        }

        .fast-spin-opt input {
            cursor: pointer;
            accent-color: var(--accent);
        }

        button {
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3) !important;
        }

        button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
        }

        .btn-spin {
            background: linear-gradient(135deg, #ff007a, #b00055);
            color: white;
        }

        .btn-spin:hover {
            filter: brightness(1.2);
        }

        .btn-reset {
            background: #444;
            color: #ccc;
        }

        /* Inventory Grid */
        .inventory-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.5em;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .card.has-items {
            border-color: rgba(166, 227, 161, 0.3);
        }

        .card.rare {
            border-color: rgba(255, 204, 0, 0.3);
            background: radial-gradient(circle at top right, rgba(255, 204, 0, 0.1), transparent);
        }

        .card-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 5px;
        }

        .card-name {
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 5px;
            height: 2.4em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-prob {
            font-size: 0.75em;
            color: #888;
        }

        .card-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: none;
        }

        .card.has-items .card-count {
            display: block;
        }

        @media (max-width: 720px) {
            .roulette-wrapper {
                transform: scale(0.5);
                margin: -100px 0;
            }
            .roulette-marker {
                top: 50%;
                height: 140px;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="mainTitle">ROX Simulator</h1>
        <button class="lang-toggle" onclick="toggleLang()">PT / EN</button>
    </header>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-label" id="labelSpins">Total Spins</span>
            <span id="totalSpins" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label" id="labelExtra">Extra Spins</span>
            <span id="extraSpins" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label" id="labelValue">Total Value (Crystals)</span>
            <span id="totalValue" class="stat-value">0</span>
        </div>
    </div>

    <div class="lucky-title">Lucky Draw</div>
    
    <div class="roulette-wrapper">
        <div id="rouletteMarker" class="roulette-marker"></div>
        <div class="roulette-viewport">
            <div id="rouletteTrack" class="roulette-track"></div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button id="btnSpin1" class="btn-spin" onclick="handleSpin(1)">Spin 1x</button>
            <button id="btnSpin10" class="btn-spin" onclick="handleSpin(10)">Spin 10x</button>
            <button id="btnReset" class="btn-reset" onclick="reset()">Reset</button>
        </div>
        <label class="fast-spin-opt">
            <input type="checkbox" id="fastSpin"> <span id="labelFast">Fast Spin (Skip animation)</span>
        </label>
    </div>

    <section class="inventory-section">
        <h2 id="labelInventory">Your Inventory</h2>
        <div id="inventoryGrid" class="grid"></div>
    </section>
</div>

<script>
    const translations = {
        en: {
            mainTitle: "ROX Simulator",
            labelSpins: "Total Spins",
            labelExtra: "Extra Spins",
            labelValue: "Total Value (Crystals)",
            labelInventory: "Your Inventory",
            btnSpin1: "Spin 1x",
            btnSpin10: "Spin 10x",
            btnReset: "Reset",
            labelFast: "Fast Spin (Skip animation)",
            crystals: "Crystals"
        },
        pt: {
            mainTitle: "Simulador ROX",
            labelSpins: "Giros Totais",
            labelExtra: "Giros Extras",
            labelValue: "Valor Total (Cristais)",
            labelInventory: "Seu Inventário",
            btnSpin1: "Girar 1x",
            btnSpin10: "Girar 10x",
            btnReset: "Resetar",
            labelFast: "Giro Rápido (Pular animação)",
            crystals: "Cristais"
        }
    };

    const prizes = [
        { name: "Album de Carta Dourado", en: "Golden Card Album", prob: 0.000187, value: 3000000, isRare: true, img: "icon01.png" },
        { name: "Montaria", en: "Mount", prob: 0.000422, value: 3000000, isRare: true, img: "icon02.png" },
        { name: "Album carta Azul", en: "Blue Card Album", prob: 0.001850, value: 500000, isRare: true, img: "icon08.png" },
        { name: "5 Packs de Encantamento", en: "5 Enchantment Packs", prob: 0.003955, value: 300000, img: "icon03.png" },
        { name: "1 Packs de Refino", en: "1 Refine Pack", prob: 0.003955, value: 350000, img: "icon04.png" },
        { name: "10 Packs de Sombria", en: "10 Shadow Packs", prob: 0.003955, value: 320000, img: "icon05.png" },
        { name: "10 Moedas para Novos Giros", en: "10 Spin Coins", prob: 0.003955, value: 200000, extra: 10, img: "icon06.png" },
        { name: "500 Balões", en: "500 Balloons", prob: 0.003955, value: 130000, img: "icon07.png" },
        { name: "1 Pack de Upgrade", en: "1 Upgrade Pack", prob: 0.060916, value: 20000, img: "icon09.png" },
        { name: "4 Pack de Planta", en: "4 Herb Packs", prob: 0.060916, value: 10000, img: "icon10.png" },
        { name: "4 Pack de Minério", en: "4 Ore Packs", prob: 0.060916, value: 10000, img: "icon11.png" },
        { name: "4 Moeda de Blessing", en: "4 Blessing Coins", prob: 0.060916, value: 40000, img: "icon12.png" },
        { name: "2 Moedas para Novos Giros", en: "2 Spin Coins", prob: 0.060916, value: 40000, extra: 2, img: "icon13.png" },
        { name: "50 Balões", en: "50 Balloons", prob: 0.060916, value: 13000, img: "icon14.png" },
        { name: "1 Stamina", en: "1 Stamina", prob: 0.122450, value: 13000, img: "icon15.png" },
        { name: "1 Moeda de Blessing", en: "1 Blessing Coin", prob: 0.122450, value: 10000, img: "icon16.png" },
        { name: "10 Balões", en: "10 Balloons", prob: 0.122450, value: 2700, img: "icon17.png" },
        { name: "10.000 Crystais", en: "10,000 Crystals", prob: 0.122450, value: 10000, img: "icon18.png" },
        { name: "2 Carat Diamond", en: "2 Carat Diamond", prob: 0.122450, value: 1000, img: "icon19.png" }
    ];

    let currentLang = 'en';

    let cumulativePrizes = [];
    let currentAccumulator = 0;
    prizes.forEach(p => {
        currentAccumulator += p.prob;
        cumulativePrizes.push({ ...p, threshold: currentAccumulator });
    });

    let state = {
        spins: 0,
        extraSpinsWon: 0,
        totalCrystalValue: 0,
        inventory: {},
        isSpinning: false
    };

    function initInventory() {
        prizes.forEach(p => state.inventory[p.name] = 0);
    }

    const formatNumber = (num) => new Intl.NumberFormat(currentLang === 'en' ? 'en-US' : 'pt-BR').format(num);

    function toggleLang() {
        currentLang = currentLang === 'en' ? 'pt' : 'en';
        applyLang();
        updateUI();
    }

    function applyLang() {
        const t = translations[currentLang];
        document.getElementById('mainTitle').innerText = t.mainTitle;
        document.getElementById('labelSpins').innerText = t.labelSpins;
        document.getElementById('labelExtra').innerText = t.labelExtra;
        document.getElementById('labelValue').innerText = t.labelValue;
        document.getElementById('labelInventory').innerText = t.labelInventory;
        document.getElementById('btnSpin1').innerText = t.btnSpin1;
        document.getElementById('btnSpin10').innerText = t.btnSpin10;
        document.getElementById('btnReset').innerText = t.btnReset;
        document.getElementById('labelFast').innerText = t.labelFast;
    }

    function createCard(p) {
        const count = state.inventory[p.name];
        const card = document.createElement('div');
        card.className = `card ${p.isRare ? 'rare' : ''} ${count > 0 ? 'has-items' : ''}`;
        
        const displayName = currentLang === 'en' ? p.en : p.name;
        
        card.innerHTML = `
            <div class="card-count">${formatNumber(count)}</div>
            <div class="card-icon" style="background-image: url('${p.img}')"></div>
            <div class="card-name">${displayName}</div>
            <div class="card-prob">${(p.prob * 100).toFixed(4)}%</div>
        `;
        return card;
    }

    function updateUI() {
        document.getElementById('totalSpins').innerText = formatNumber(state.spins);
        document.getElementById('extraSpins').innerText = formatNumber(state.extraSpinsWon);
        document.getElementById('totalValue').innerText = formatNumber(state.totalCrystalValue);

        const grid = document.getElementById('inventoryGrid');
        grid.innerHTML = '';
        prizes.forEach(p => {
            grid.appendChild(createCard(p));
        });
    }

    function spinLogic() {
        state.spins++;
        const roll = Math.random();
        const wonItem = cumulativePrizes.find(p => roll <= p.threshold) || cumulativePrizes[cumulativePrizes.length - 1];
        
        state.inventory[wonItem.name]++;
        state.totalCrystalValue += wonItem.value;
        if (wonItem.extra) {
            state.extraSpinsWon += wonItem.extra;
        }
        return wonItem;
    }

    function setControlsDisabled(disabled) {
        document.getElementById('btnSpin1').disabled = disabled;
        document.getElementById('btnSpin10').disabled = disabled;
        document.getElementById('btnReset').disabled = disabled;
        document.getElementById('fastSpin').disabled = disabled;
    }

    async function handleSpin(times) {
        if (state.isSpinning) return;
        
        const fast = document.getElementById('fastSpin').checked;
        
        if (fast) {
            document.getElementById('rouletteMarker').classList.add('hidden');
            let wonItems = [];
            for (let i = 0; i < times; i++) {
                wonItems.push(spinLogic());
            }
            updateUI();
            
            if (times === 10) {
                showFastSpinGrid(wonItems);
            } else if (wonItems.length > 0) {
                showFastSpinItem(wonItems[0]);
            }
        } else {
            document.getElementById('rouletteMarker').classList.remove('hidden');
            setControlsDisabled(true);
            for (let i = 0; i < times; i++) {
                await animateSpin();
            }
            setControlsDisabled(false);
        }
    }

    function showFastSpinGrid(items) {
        const track = document.getElementById('rouletteTrack');
        track.className = 'roulette-track fast-spin-grid';
        track.style.transition = 'none';
        track.style.left = '0px'; // Reseta o posicionamento para exibir todos os 10 itens
        track.innerHTML = '';
        
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `roulette-item ${item.isRare ? 'rare' : ''}`;
            
            div.style.transition = 'transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.1s ease-out';
            div.style.transitionDelay = `${index * 0.03}s`;
            div.style.transform = 'scale(0)';
            div.style.opacity = '0';
            div.style.boxSizing = 'border-box'; // Garante que as bordas não desalinhem o grid
            div.innerHTML = `<div class="item-icon" style="background-image: url('${item.img}')"></div>`;
            track.appendChild(div);
        });

        track.offsetHeight; // Reflow

        Array.from(track.children).forEach(div => {
            div.style.transform = 'scale(1)';
            div.style.opacity = '1';
        });
    }

    function showFastSpinItem(item) {
        const track = document.getElementById('rouletteTrack');
        track.className = 'roulette-track'; // Reset class for single item
        track.style.transition = 'none';
        track.innerHTML = '';
        
        const div = document.createElement('div');
        div.className = `roulette-item ${item.isRare ? 'rare' : ''}`;
        div.style.transition = 'transform 0.1s ease-out, opacity 0.1s ease-out';
        div.style.transform = 'scale(0.5)';
        div.style.opacity = '0.5';
        div.innerHTML = `<div class="item-icon" style="background-image: url('${item.img}')"></div>`;
        track.appendChild(div);

        const viewportWidth = 580;
        const itemWidth = 120;
        track.style.left = `${(viewportWidth / 2) - (itemWidth / 2)}px`;

        track.offsetHeight; // Reflow

        div.style.transform = 'scale(1)';
        div.style.opacity = '1';
    }

    function animateSpin() {
        return new Promise((resolve) => {
            state.isSpinning = true;
            const track = document.getElementById('rouletteTrack');
            track.className = 'roulette-track'; // Reset class for animation
            track.style.transition = 'none';
            track.style.left = '0px';

            
            const itemCount = 50;
            const itemWidth = 120;
            track.innerHTML = '';
            
            for (let i = 0; i < itemCount; i++) {
                const roll = Math.random();
                const item = cumulativePrizes.find(p => roll <= p.threshold) || cumulativePrizes[cumulativePrizes.length - 1];
                const div = document.createElement('div');
                div.className = `roulette-item ${item.isRare ? 'rare' : ''}`;
                div.innerHTML = `<div class="item-icon" style="background-image: url('${item.img}')"></div>`;
                track.appendChild(div);
            }

            const winningItem = spinLogic();
            const winningIndex = itemCount - 5;
            const winningDiv = track.children[winningIndex];
            winningDiv.className = `roulette-item ${winningItem.isRare ? 'rare' : ''}`;
            winningDiv.innerHTML = `<div class="item-icon" style="background-image: url('${winningItem.img}')"></div>`;

            const viewportWidth = 580;
            const stopPos = -(winningIndex * itemWidth) + (viewportWidth / 2) - (itemWidth / 2);

            track.offsetHeight;
            track.style.transition = 'left 2s cubic-bezier(0.1, 0, 0.1, 1)'; // Acelerei um pouco para o 10x não ser eterno
            track.style.left = stopPos + 'px';

            setTimeout(() => {
                state.isSpinning = false;
                updateUI();
                resolve();
            }, 2100);
        });
    }

    function reset() {
        if (state.isSpinning) return;
        
        const marker = document.getElementById('rouletteMarker');
        if (marker) marker.classList.remove('hidden');
        
        state.spins = 0;
        state.extraSpinsWon = 0;
        state.totalCrystalValue = 0;
        initInventory();
        updateUI();
        document.getElementById('rouletteTrack').innerHTML = '';
        document.getElementById('rouletteTrack').style.left = '0px';
    }

    initInventory();
    applyLang();
    updateUI();
</script>
</body>
</html>
